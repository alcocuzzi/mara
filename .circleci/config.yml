version: 2.1

jobs:
  build-arm64:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install Depot CLI
          command: |
            curl -L https://depot.dev/install-cli.sh | sudo env DEPOT_INSTALL_DIR=/usr/local/bin sh
      - run:
          name: Login to Docker Hub
          command: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build ARM64 Image with Depot
          command: |
            depot build \
              --platform linux/arm64 \
              -t thecoderepublic/mara:arm64 \
              -f Dockerfile_arm64 .
      - run:
          name: Create and Push Multi-Arch Manifest
          command: |
            docker buildx imagetools create \
              --tag thecoderepublic/mara:latest \
              thecoderepublic/mara:arm64
      - run:
          name: Inspect Multi-Arch Manifest
          command: docker buildx imagetools inspect thecoderepublic/mara:latest

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build-arm64


