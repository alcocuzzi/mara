version: 2.1

executors:
  docker-arm64-executor:
    machine: 
      image: ubuntu-2204:current
    resource_class: arm.medium

jobs:
  build-arm64:
    executor: docker-arm64-executor
    steps:
      - checkout
      - run:
          name: Set up Docker Buildx
          command: |
            docker run --privileged --rm tonistiigi/binfmt --install all
            docker buildx create --platform "linux/arm64" --use
            docker buildx inspect --bootstrap
      - run:
          name: Login to Docker hub
          command: echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin
      - run:
          name: Build ARM64 image
          command: |
            docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile_arm64 \
            -t $DOCKERHUB_USERNAME/mara:latest \
            --push 
workflows:
  build_and_push:
    jobs:
      - build-arm64
