version: 2.1

executors:
  arm64-executor:
    docker:
      - image: cimg/base:2025.06-22.04

jobs:
  build-arm64:
    executor: arm64-executor
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.7
      - run:
          name: Build ARM64 Docker Image
          command: |
            docker build --platform linux/arm64 -t my-arm64-image .

workflows:
  build-and-deploy:
    jobs:
      - build-arm64