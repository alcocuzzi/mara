version: 2.1

executors:
  docker-arm64-executor:
    machine: 
      image: ubuntu-2204:current
    resource_class: arm.medium
jobs:
  build-and-push-multiarch:
    executor: docker-arm64-executor
    steps:
      - checkout
      - run:
          name: Setup Docker Buildx
          command: |
            docker run --privileged --rm tonistiigi/binfmt --install all
            docker buildx create --use
            docker buildx inspect --bootstrap
      - run:
          name: Docker Login
          command: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build and Push Multi-Arch Image as `latest`
          command: |
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -t $DOCKERHUB_USERNAME/mara:latest \
              --push \
              .

workflows:
  build_and_push:
    jobs:
      - build-and-push-multiarch
