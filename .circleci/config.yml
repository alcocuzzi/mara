version: 2.1

executors:
  docker-arm64-executor:
    machine: 
      image: ubuntu-2204:current
    resource_class: arm.medium

  docker-amd64-executor:
    machine:
      image: ubuntu-2204:current
    resource_class: medium

jobs:
  build-arm64:
    executor: docker-arm64-executor
    steps:
      - checkout
      - run:
          name: Setup Docker Buildx
          command: |
            docker run --privileged --rm tonistiigi/binfmt --install all
            docker buildx create --use
            docker buildx inspect --bootstrap
      - run:
          name: Docker Login
          command: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build and Push ARM64 Image (temp tag)
          command: |
            docker buildx build \
              --platform linux/arm64 \
              -f Dockerfile_arm64 \
              -t $DOCKERHUB_USERNAME/mara:temp-arm64 \
              .

  build-amd64:
    executor: docker-amd64-executor
    steps:
      - checkout
      - run:
          name: Setup Docker Buildx
          command: |
            docker run --privileged --rm tonistiigi/binfmt --install all
            docker buildx create --use
            docker buildx inspect --bootstrap
      - run:
          name: Docker Login
          command: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build and Push AMD64 Image (temp tag)
          command: |
            docker buildx build \
              --platform linux/amd64 \
              -f Dockerfile \
              -t $DOCKERHUB_USERNAME/mara:temp-amd64 \
              .

  create-manifest:
    executor: docker-arm64-executor
    steps:
      - run:
          name: Docker Login
          command: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Create and Push Multi-Arch Manifest (latest)
          command: |
            docker buildx imagetools create \
              --tag $DOCKERHUB_USERNAME/mara:latest \
              $DOCKERHUB_USERNAME/mara:temp-amd64 \
              $DOCKERHUB_USERNAME/mara:temp-arm64
      - run:
          name: Inspect Pushed Manifest
          command: docker buildx imagetools inspect $DOCKERHUB_USERNAME/mara:latest

workflows:
  build_and_push:
    jobs:
      - build-arm64
      - build-amd64
      - create-manifest:
          requires:
            - build-arm64
            - build-amd64
